<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>Clean Architecture Diagram</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0e1a;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Inter', system-ui, sans-serif;
  }
</style>
</head>
<body>
<svg viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg"
     style="width:min(900px,98vw);height:auto">

  <defs>
    <!-- ring fills -->
    <radialGradient id="gMw" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2d1f4e"/>
      <stop offset="100%" stop-color="#1a1130"/>
    </radialGradient>
    <radialGradient id="gSv" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a2d4e"/>
      <stop offset="100%" stop-color="#0f1a30"/>
    </radialGradient>
    <radialGradient id="gIn" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2d2200"/>
      <stop offset="100%" stop-color="#1a1500"/>
    </radialGradient>
    <radialGradient id="gDm" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0f2d1f"/>
      <stop offset="100%" stop-color="#071a10"/>
    </radialGradient>

    <!-- arrow marker -->
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 Z" fill="#475569"/>
    </marker>
  </defs>

  <!-- ── background ── -->
  <rect width="900" height="620" fill="#0a0e1a" rx="16"/>

  <!-- ── rings (largest to smallest) ── -->
  <!-- Middleware ring -->
  <circle cx="450" cy="310" r="285" fill="url(#gMw)" stroke="#a78bfa" stroke-width="2" opacity="0.9"/>
  <!-- Services ring -->
  <circle cx="450" cy="310" r="210" fill="url(#gSv)" stroke="#60a5fa" stroke-width="2" opacity="0.9"/>
  <!-- Infrastructure ring -->
  <circle cx="450" cy="310" r="138" fill="url(#gIn)" stroke="#fbbf24" stroke-width="2" opacity="0.9"/>
  <!-- Domain ring -->
  <circle cx="450" cy="310" r="72"  fill="url(#gDm)" stroke="#34d399" stroke-width="2.5"/>

  <!-- ── DOMAIN label (center) ── -->
  <text x="450" y="300" text-anchor="middle" fill="#34d399" font-size="13" font-weight="700" letter-spacing="1">DOMAIN</text>
  <text x="450" y="316" text-anchor="middle" fill="#34d399" font-size="10" opacity="0.7">Core</text>
  <!-- domain items -->
  <text x="450" y="334" text-anchor="middle" fill="#86efac" font-size="9.5" opacity="0.85">Entity · Interface</text>

  <!-- ── INFRASTRUCTURE label ── -->
  <!-- top label -->
  <text x="450" y="188" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="700" letter-spacing="0.5">INFRASTRUCTURE</text>
  <!-- items at bottom of ring -->
  <text x="450" y="428" text-anchor="middle" fill="#fde68a" font-size="9.5" opacity="0.8">Prisma · Redis · Queue · Storage</text>

  <!-- ── SERVICES label ── -->
  <text x="450" y="122" text-anchor="middle" fill="#60a5fa" font-size="12" font-weight="700" letter-spacing="0.5">SERVICES</text>
  <text x="450" y="496" text-anchor="middle" fill="#93c5fd" font-size="9.5" opacity="0.8">AuthService · ApplicationService · NotificationService</text>

  <!-- ── MIDDLEWARE label ── -->
  <text x="450" y="52" text-anchor="middle" fill="#a78bfa" font-size="12" font-weight="700" letter-spacing="0.5">MIDDLEWARE</text>
  <text x="450" y="567" text-anchor="middle" fill="#c4b5fd" font-size="9.5" opacity="0.8">authMiddleware · idempotencyMiddleware · requireRole</text>

  <!-- ══════════════════════════════════════════
       RIGHT SIDE — callout boxes
       ══════════════════════════════════════════ -->

  <!-- connector lines (dashed) -->
  <line x1="735" y1="90"  x2="695" y2="90"  stroke="#475569" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="695" y1="90"  x2="630" y2="130" stroke="#475569" stroke-width="1" stroke-dasharray="4,3"/>

  <line x1="735" y1="190" x2="680" y2="190" stroke="#475569" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="680" y1="190" x2="620" y2="220" stroke="#475569" stroke-width="1" stroke-dasharray="4,3"/>

  <line x1="735" y1="295" x2="665" y2="295" stroke="#475569" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="665" y1="295" x2="592" y2="295" stroke="#475569" stroke-width="1" stroke-dasharray="4,3"/>

  <line x1="735" y1="400" x2="695" y2="400" stroke="#475569" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="695" y1="400" x2="523" y2="360" stroke="#475569" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- callout: Middleware -->
  <rect x="735" y="62" width="150" height="58" rx="8" fill="#1a1130" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="745" y="80"  fill="#a78bfa" font-size="10" font-weight="700">Middleware</text>
  <text x="745" y="95"  fill="#c4b5fd" font-size="9">• 驗證 JWT Token</text>
  <text x="745" y="108" fill="#c4b5fd" font-size="9">• 檢查角色權限</text>

  <!-- callout: Services -->
  <rect x="735" y="162" width="150" height="58" rx="8" fill="#0f1a30" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="745" y="180" fill="#60a5fa" font-size="10" font-weight="700">Services</text>
  <text x="745" y="195" fill="#93c5fd" font-size="9">• 業務流程編排</text>
  <text x="745" y="208" fill="#93c5fd" font-size="9">• 呼叫 IRepository</text>

  <!-- callout: Infrastructure -->
  <rect x="735" y="267" width="150" height="58" rx="8" fill="#1a1500" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="745" y="285" fill="#fbbf24" font-size="10" font-weight="700">Infrastructure</text>
  <text x="745" y="300" fill="#fde68a" font-size="9">• 實作 IRepository</text>
  <text x="745" y="313" fill="#fde68a" font-size="9">• 唯一碰 DB 的層</text>

  <!-- callout: Domain -->
  <rect x="735" y="372" width="150" height="58" rx="8" fill="#071a10" stroke="#34d399" stroke-width="1.5"/>
  <text x="745" y="390" fill="#34d399" font-size="10" font-weight="700">Domain</text>
  <text x="745" y="405" fill="#86efac" font-size="9">• Entity 定義欄位</text>
  <text x="745" y="418" fill="#86efac" font-size="9">• Interface 定義操作</text>

  <!-- ══════════════════════════════════════════
       LEFT SIDE — dependency rule note
       ══════════════════════════════════════════ -->
  <!-- vertical arrow showing dependency direction -->
  <line x1="60" y1="120" x2="60" y2="490" stroke="#475569" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="68" y="200" fill="#475569" font-size="9" transform="rotate(-90,68,200)" text-anchor="middle">依賴方向（外 → 內）</text>

  <!-- HTTP request flow arrow -->
  <line x1="110" y1="80" x2="110" y2="530" stroke="#334155" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="96" y="180" fill="#334155" font-size="9" transform="rotate(-90,96,300)" text-anchor="middle">HTTP Request 流向</text>

  <!-- title -->
  <text x="450" y="600" text-anchor="middle" fill="#475569" font-size="10" letter-spacing="1">
    內層不認識外層 · 外層透過 Interface 呼叫內層
  </text>

</svg>
</body>
</html>
