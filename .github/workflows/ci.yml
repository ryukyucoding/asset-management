name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Backend: test + build ────────────────────────────────────────────────────
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: asset_management_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml

      - run: pnpm install

      # Generate Prisma client types
      - run: pnpm db:generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/asset_management_test

      # Apply migrations so the test DB has the correct schema
      - run: pnpm db:migrate:prod
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/asset_management_test

      - run: pnpm test:coverage
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/asset_management_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret
          JWT_REFRESH_SECRET: test-refresh-secret
          STORAGE_DRIVER: local
          BASE_URL: http://localhost:3000

      - run: pnpm build

  # ── Frontend: type-check + test + build ──────────────────────────────────────
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - run: pnpm install
      - run: pnpm type-check
      - run: pnpm test:unit
      - run: pnpm build
        env:
          VITE_API_URL: http://localhost:3000

  # ── Docker: verify both images build successfully ────────────────────────────
  docker-build:
    runs-on: ubuntu-latest
    # Only run on pushes to main (skip on every PR to save CI minutes)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f backend/Dockerfile -t asset-backend .

      - name: Build frontend image
        run: |
          docker build \
            -f frontend/Dockerfile \
            --build-arg VITE_API_URL=http://localhost:3000 \
            -t asset-frontend .
